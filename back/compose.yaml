services:
  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-ppass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    ports:
      - "${DB_PORT}:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    restart: unless-stopped

  adminer:
    image: adminer

    restart: unless-stopped

    ports:
      - "${ADMINER_PORT}:8080"

    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: .

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "${BACKEND_PORT}:8080"

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

volumes:
  mysql_data: