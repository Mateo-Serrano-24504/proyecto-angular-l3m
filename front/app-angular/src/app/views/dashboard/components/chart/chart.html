<div class="chart-actions">
  <label>
    <input
      type="checkbox"
      (change)="toggleChartType()"
    />

    Usar gráfico de barras
  </label>
</div>

@if (hasData()) {
  <p-chart
    [type]="chartType()"
    [data]="data()"
    [options]="chartType() === 'radar' ? radarOptions : barOptions"
  ></p-chart>
} @else {
  <p>No hay datos disponibles</p>
}
